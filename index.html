  }

  .avatar {

    color: var(--bg);

    justify-content: center;
    font-size: 28px;
    font-weight: 600;
    margin: 0 auto 20px;
    letter-spacing: 0.02em;
  }

  h1 {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }

  .tagline {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 36px;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border: 1px solid var(--line);
    border-radius: 10px;
    text-decoration: none;
    color: var(--ink);
    background: #fff;
    transition: border-color 0.15s ease, transform 0.1s ease;
    text-align: left;
  }

  .link:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .link:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .icon {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    fill: var(--ink);
  }

  .label {
    font-size: 15px;
    font-weight: 500;
  }

  .sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  footer {
    margin-top: 36px;
    font-size: 12px;
    color: var(--muted);
  }

  @media (max-width: 380px) {
    .label { font-size: 14px; }
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(20, 30, 45, 0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }

  .overlay.show {
    display: flex;
  }

  .popup {
    background: #fff;
    border-radius: 12px;
    padding: 32px 28px;
    text-align: center;
    max-width: 320px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.15);
  }

  .popup h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .popup p {
